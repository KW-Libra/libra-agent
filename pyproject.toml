[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "libra-agent"
version = "0.1.0"
description = "Standalone multi-agent runtime for LIBRA"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27.0",
  "langgraph>=1.1.6",
  "langgraph-checkpoint-sqlite>=3.0.3",
]

[project.scripts]
libra-agent-run = "libra_agent.libra_cli:main"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["libra_agent*"]
