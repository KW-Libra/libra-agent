name: Deploy EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/libra_ec2
          chmod 600 ~/.ssh/libra_ec2
          ssh-keyscan -p "${EC2_PORT:-22}" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh -i ~/.ssh/libra_ec2 -p "${EC2_PORT:-22}" "$EC2_USER@$EC2_HOST" \
            "APP_DIR='${EC2_APP_DIR:-/opt/libra/app/libra-agent}' bash -s" <<'EOF'
          set -euo pipefail
          cd "$APP_DIR"
          git fetch --prune origin
          git reset --hard origin/main
          mkdir -p /opt/libra/data/agent-outputs /opt/libra/data/caddy-data /opt/libra/data/caddy-config
          test -f .env.prod
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build agent caddy
          docker image prune -f
          EOF
