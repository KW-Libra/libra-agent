name: Agent CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: agent-prod
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

jobs:
  test-package-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          pytest

      - name: Package
        run: |
          tar \
            --exclude=".venv" \
            --exclude="__pycache__" \
            --exclude="*.pyc" \
            -czf libra-agent.tar.gz .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact
        env:
          DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
        run: |
          set -euo pipefail
          : "${DEPLOY_BUCKET:?Set repository variable DEPLOY_BUCKET}"
          aws s3 cp libra-agent.tar.gz "s3://${DEPLOY_BUCKET}/deploy-artifacts/agent/${GITHUB_SHA}/libra-agent.tar.gz"

      - name: Deploy through SSM
        env:
          AGENT_INSTANCE_ID: ${{ vars.AGENT_INSTANCE_ID }}
          DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
        run: |
          set -euo pipefail
          : "${AGENT_INSTANCE_ID:?Set repository variable AGENT_INSTANCE_ID}"
          : "${DEPLOY_BUCKET:?Set repository variable DEPLOY_BUCKET}"

          cat > ssm-params.json <<EOF
          {
            "commands": [
              "set -eu",
              "aws s3 cp s3://${DEPLOY_BUCKET}/deploy-artifacts/agent/${GITHUB_SHA}/libra-agent.tar.gz /tmp/libra-agent.tar.gz",
              "rm -rf /opt/libra/agent/app",
              "install -d -o libra -g libra -m 0750 /opt/libra/agent/app",
              "tar -xzf /tmp/libra-agent.tar.gz -C /opt/libra/agent/app",
              "python3 -m venv /opt/libra/agent/.venv",
              "/opt/libra/agent/.venv/bin/python -m pip install --upgrade pip setuptools wheel",
              "/opt/libra/agent/.venv/bin/pip install -e /opt/libra/agent/app",
              "chown -R libra:libra /opt/libra/agent/app /opt/libra/agent/.venv",
              "systemctl restart libra-agent",
              "sleep 8",
              "systemctl is-active --quiet libra-agent",
              "curl -fsS http://127.0.0.1:8000/health"
            ]
          }
          EOF

          command_id="$(aws ssm send-command \
            --instance-ids "${AGENT_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy libra-agent ${GITHUB_SHA}" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)"

          set +e
          aws ssm wait command-executed --command-id "${command_id}" --instance-id "${AGENT_INSTANCE_ID}"
          wait_status=$?
          set -e

          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${AGENT_INSTANCE_ID}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

          exit "${wait_status}"
